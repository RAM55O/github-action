name: Hello World Concurrent

on:
  push:
    branches :
      - main
      - features/login
      - develop
      - 'release/**'
  pull_request:
    
    branches:
      - main



jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Hello Step
        run: |
          echo "one"
          echo "two"
  hello1:
    runs-on: ubuntu-latest
    needs: hello

    steps:
      - name: Hello Step
        run: |
          echo "hellow , ${{vars.my}}"
          echo "hellow "
          echo "one"
          echo "two"
  hello3:
    runs-on: ubuntu-latest
    needs: hello

    steps:
      - name: Hello Step
        run: |
          echo "one"
          echo "two"          
